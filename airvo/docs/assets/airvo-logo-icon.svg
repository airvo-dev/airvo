<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a394ff"/>
      <stop offset="100%" stop-color="#fa6d8f"/>
    </linearGradient>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6dfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fa6d8f" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a394ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c6dfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Glow background -->
  <circle cx="24" cy="24" r="22" fill="url(#centerGlow)"/>
  <!-- Connection lines -->
  <line x1="24" y1="24" x2="38" y2="10" stroke="url(#lineGradient)" stroke-width="1.2" opacity="0.7"/>
  <line x1="24" y1="24" x2="42" y2="24" stroke="url(#lineGradient)" stroke-width="1.2" opacity="0.7"/>
  <line x1="24" y1="24" x2="38" y2="38" stroke="url(#lineGradient)" stroke-width="1.2" opacity="0.7"/>
  <line x1="24" y1="24" x2="8"  y2="12" stroke="url(#lineGradient)" stroke-width="1.2" opacity="0.4"/>
  <line x1="24" y1="24" x2="8"  y2="36" stroke="url(#lineGradient)" stroke-width="1.2" opacity="0.4"/>
  <line x1="38" y1="10" x2="42" y2="24" stroke="url(#lineGradient)" stroke-width="0.8" opacity="0.3"/>
  <line x1="42" y1="24" x2="38" y2="38" stroke="url(#lineGradient)" stroke-width="0.8" opacity="0.3"/>
  <!-- Satellite nodes -->
  <circle cx="38" cy="10" r="3" fill="#7c6dfa" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="42" cy="24" r="2.5" fill="#9080ff" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="38" cy="38" r="3" fill="#fa6d8f" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="8"  cy="12" r="2" fill="#7c6dfa" opacity="0.4"/>
  <circle cx="8"  cy="36" r="2" fill="#7c6dfa" opacity="0.4"/>
  <!-- Center node -->
  <circle cx="24" cy="24" r="8" fill="url(#mainGradient)" filter="url(#strongGlow)"/>
  <circle cx="24" cy="24" r="4.5" fill="white" opacity="0.95"/>
</svg>
